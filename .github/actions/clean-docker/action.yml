name: 'Clean Docker'
description: 'Aggressive Docker cleanup for tiny EC2'
inputs:
  dry-run:
    description: 'Dry run mode'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Execute Docker Cleanup
      shell: bash
      run: |
        echo "🧹 Aggressive Docker cleanup..."

        # Kill everything Docker
        sudo docker stop $(sudo docker ps -aq) 2>/dev/null || true
        sudo docker rm -f $(sudo docker ps -aq) 2>/dev/null || true
        sudo docker rmi -f $(sudo docker images -q) 2>/dev/null || true

        # Remove ALL volumes, networks, build cache
        sudo docker volume prune -f
        sudo docker volume rm $(sudo docker volume ls -q) 2>/dev/null || true
        sudo docker network prune -f

        # Nuclear option
        sudo docker system prune -a -f --volumes

        # Clear disk caches
        sync && sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true

        # Verify space
        df -h / | head -n 2
        sudo docker system df
